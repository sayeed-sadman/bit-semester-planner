<svg width="680" height="1080" viewBox="0 0 680 1080" role="img" xmlns="http://www.w3.org/2000/svg" style="background:white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
  <title>BIT Semester Planner — Use Case Diagram</title>
  <desc>Use case diagram showing three actors: Public User, Student, and Admin, and their interactions with the BIT Semester Planner system.</desc>

  <!-- System boundary -->
  <rect x="140" y="20" width="400" height="1040" rx="16" fill="none" stroke="#1f1e1d" stroke-opacity="0.3" stroke-width="0.5" stroke-dasharray="6 4"/>
  <text x="340" y="44" text-anchor="middle" fill="#3d3d3a" font-size="12">BIT Semester Planner System</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- AUTHENTICATION -->
  <!-- ══════════════════════════════════════════ -->
  <text x="340" y="72" text-anchor="middle" fill="#141413" font-size="13" font-weight="600">Authentication</text>

  <!-- View landing page | US-04 -->
  <ellipse cx="340" cy="100" rx="108" ry="22" fill="#f5f4ed" stroke="#1f1e1d" stroke-opacity="0.3" stroke-width="0.5"/>
  <text x="340" y="97" text-anchor="middle" fill="#3d3d3a" font-size="11.5" font-weight="500">View landing page</text>
  <text x="340" y="112" text-anchor="middle" fill="#888" font-size="9.5">US-04</text>

  <!-- Login | US-01, US-03 -->
  <ellipse cx="340" cy="148" rx="108" ry="22" fill="#f5f4ed" stroke="#1f1e1d" stroke-opacity="0.3" stroke-width="0.5"/>
  <text x="340" y="145" text-anchor="middle" fill="#3d3d3a" font-size="11.5" font-weight="500">Login</text>
  <text x="340" y="160" text-anchor="middle" fill="#888" font-size="9.5">US-01, US-03</text>

  <!-- Register account | US-02 -->
  <ellipse cx="340" cy="196" rx="108" ry="22" fill="#f5f4ed" stroke="#1f1e1d" stroke-opacity="0.3" stroke-width="0.5"/>
  <text x="340" y="193" text-anchor="middle" fill="#3d3d3a" font-size="11.5" font-weight="500">Register account</text>
  <text x="340" y="208" text-anchor="middle" fill="#888" font-size="9.5">US-02</text>

  <!-- Edit profile | US-07 -->
  <ellipse cx="340" cy="244" rx="108" ry="22" fill="#f5f4ed" stroke="#1f1e1d" stroke-opacity="0.3" stroke-width="0.5"/>
  <text x="340" y="241" text-anchor="middle" fill="#3d3d3a" font-size="11.5" font-weight="500">Edit profile</text>
  <text x="340" y="256" text-anchor="middle" fill="#888" font-size="9.5">US-07</text>

