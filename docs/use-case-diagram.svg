  <text x="340" y="315" text-anchor="middle" fill="#3d3d3a" font-size="11.5" font-weight="500">Browse modules</text>
  <text x="340" y="330" text-anchor="middle" fill="#888" font-size="9.5">US-08, US-14</text>

