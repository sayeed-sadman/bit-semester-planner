  <ellipse cx="340" cy="606" rx="108" ry="22" fill="#f6eedf" stroke="#805c1f" stroke-width="0.5"/>
  <text x="340" y="603" text-anchor="middle" fill="#3d3d3a" font-size="11.5" font-weight="500">Edit module</text>
  <text x="340" y="618" text-anchor="middle" fill="#888" font-size="9.5">US-12</text>

